{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="glass-panel p-8 rounded-xl text-center shadow-lg">
        <h2 class="text-3xl font-bold mb-4 text-white">Geochemical Data Ingestion</h2>
        <p class="text-gray-400 mb-8">Upload a valid XRF CSV file. The system will auto-detect coordinate arrays and elemental signatures.</p>
        
        <form action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data" class="mb-6">
            <label class="flex flex-col items-center px-4 py-6 bg-gray-800 text-gray-400 rounded-lg shadow-inner border-2 border-dashed border-gray-600 cursor-pointer hover:bg-gray-700 hover:border-neon transition">
                <svg class="w-8 h-8 mb-2 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <span class="mt-2 text-base leading-normal">Select CSV File</span>
                <input type='file' name="file" class="hidden" accept=".csv" required onchange="this.form.submit()" />
            </label>
        </form>

        <div class="flex items-center justify-center space-x-4">
            <span class="h-px w-16 bg-gray-600"></span>
            <span class="text-gray-500 font-medium">OR</span>
            <span class="h-px w-16 bg-gray-600"></span>
        </div>

        <form action="{{ url_for('use_sample') }}" method="POST" class="mt-6">
            <button type="submit" class="w-full bg-panel border border-neon text-neon py-3 rounded-lg hover:bg-neon hover:text-space font-bold transition">
                Generate & Load Synthetic Mission Data
            </button>
        </form>
    </div>
</div>
{% endblock %}
