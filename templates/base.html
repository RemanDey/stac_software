<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar XRF Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { space: '#0b0f19', panel: '#151b2b', neon: '#00e676' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.24.1/plotly.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-space text-gray-200 font-sans min-h-screen flex flex-col">
    <header class="bg-panel border-b border-gray-800 shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider text-white">
                LUNAR<span class="text-neon">XRF</span>
            </h1>
            <nav class="space-x-4">
                <a href="{{ url_for('index') }}" class="hover:text-neon transition">Home</a>
                <a href="{{ url_for('dashboard') }}" class="hover:text-neon transition">Dashboard</a>
                <a href="{{ url_for('analysis') }}" class="hover:text-neon transition">Analysis</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-panel border-t border-gray-800 py-4 text-center text-sm text-gray-500">
        &copy; 2026 Reman Dey
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
