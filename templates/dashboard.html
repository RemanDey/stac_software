{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-4 gap-6 h-full">
    
    <aside class="glass-panel p-6 rounded-xl flex flex-col space-y-6 lg:col-span-1">
        <h3 class="text-xl font-bold text-white border-b border-gray-700 pb-2">Filter Controls</h3>
        
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Target Element</label>
            <select id="element-select" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-neon"></select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Latitude Range</label>
            <div class="flex space-x-2">
                <input type="number" id="lat-min" class="w-1/2 bg-gray-800 border border-gray-600 rounded p-2 text-center text-sm" placeholder="Min">
                <input type="number" id="lat-max" class="w-1/2 bg-gray-800 border border-gray-600 rounded p-2 text-center text-sm" placeholder="Max">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Longitude Range</label>
            <div class="flex space-x-2">
                <input type="number" id="lon-min" class="w-1/2 bg-gray-800 border border-gray-600 rounded p-2 text-center text-sm" placeholder="Min">
                <input type="number" id="lon-max" class="w-1/2 bg-gray-800 border border-gray-600 rounded p-2 text-center text-sm" placeholder="Max">
            </div>
        </div>

        <button id="apply-filters" type="button" class="w-full bg-neon text-space py-2 rounded font-bold hover:bg-green-400 transition">
            Apply Filters
        </button>

        <div class="border-t border-gray-700 pt-4">
            <h3 class="text-lg font-semibold text-white mb-3">Custom Graph</h3>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Graph Type</label>
                <select id="custom-graph-type" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-neon">
                    <option value="scatter">Scatter</option>
                    <option value="line">Line</option>
                    <option value="bar">Bar</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">X Axis</label>
                <select id="custom-x" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-neon"></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Y Axis</label>
                <select id="custom-y" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-neon"></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Bar Aggregate</label>
                <select id="custom-agg" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-neon">
                    <option value="sum">Sum</option>
                    <option value="mean">Mean</option>
                    <option value="median">Median</option>
                </select>
            </div>
            <button id="apply-custom" type="button" class="w-full bg-transparent border border-neon text-neon py-2 rounded font-bold hover:bg-neon hover:text-space transition">
                Render Custom Graph
            </button>
        </div>
    </aside>

    <div class="lg:col-span-3 flex flex-col space-y-6">
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[420px]">
                <div id="map-plot" class="w-full h-full"></div>
            </div>
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[420px]">
                <div id="hist-plot" class="w-full h-full"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[340px]">
                <div id="summary-plot" class="w-full h-full"></div>
            </div>
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[340px]">
                <div id="trend-plot" class="w-full h-full"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[400px]">
                <div id="mean-chart" class="w-full h-full"></div>
            </div>
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[400px]">
                <div id="correlation-heatmap" class="w-full h-full"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[400px]">
                <div id="box-plot" class="w-full h-full"></div>
            </div>
            <div class="glass-panel p-4 rounded-xl shadow-lg h-[400px]">
                <div id="distribution-histogram" class="w-full h-full"></div>
            </div>
        </div>

        <div class="glass-panel rounded-xl shadow-lg h-[400px] relative">
            <div id="custom-plot" class="w-full h-full"></div>
            <div id="custom-plot-prompt" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 pointer-events-none">
                <svg class="w-12 h-12 mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <p class="text-sm font-medium">Configure axes and click <span class="text-neon">Render Custom Graph</span></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
